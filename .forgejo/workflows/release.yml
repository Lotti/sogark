name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all targets
        run: make build-all

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Generate release assets
        run: |
          echo "$VERSION" > bin/version.txt
          sed "s|__UPDATE_REPO__|$GITHUB_REPOSITORY|g" scripts/install.sh > bin/install.sh
          sed "s|__UPDATE_REPO__|$GITHUB_REPOSITORY|g" scripts/install.ps1 > bin/install.ps1
        env:
          UPDATE_REPO: ${{ github.repository }}

      - name: Create release and upload assets
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          tag: ${{ env.VERSION }}
          title: ${{ env.VERSION }}
          body: "Release ${{ env.VERSION }}"
          files: |
            bin/sogark-darwin-arm64
            bin/sogark-darwin-amd64
            bin/sogark-linux-amd64
            bin/sogark-windows-amd64.exe
            bin/version.txt
            bin/install.sh
            bin/install.ps1