name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all targets
        run: make build-all

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release assets
        run: |
          echo "${{ steps.version.outputs.version }}" > bin/version.txt
          sed "s|__UPDATE_REPO__|${{ github.repository }}|g" scripts/install.sh > bin/install.sh
          sed "s|__UPDATE_REPO__|${{ github.repository }}|g" scripts/install.ps1 > bin/install.ps1

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            bin/sogark-darwin-arm64
            bin/sogark-darwin-amd64
            bin/sogark-linux-amd64
            bin/sogark-linux-arm64
            bin/sogark-windows-amd64.exe
            bin/sogark-windows-arm64.exe
            bin/version.txt
            bin/install.sh
            bin/install.ps1